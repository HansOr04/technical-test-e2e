serenity.driver.capabilities = ""
serenity {
  project.name = "Technical Test E2E"
  outputDirectory = "target/site/serenity"
  restart.browser.for.each = scenario
  take.screenshots = FOR_FAILURES
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*", "test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://opencart.abstracta.us"
  }
  staging {
    webdriver.base.url = "https://staging.example.com"
  }
  production {
    webdriver.base.url = "http://opencart.abstracta.us"
  }
}
