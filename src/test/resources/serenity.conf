serenity {
  project.name = "Technical Test E2E"
  outputDirectory = "target/site/serenity"
}

webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = [
        "remote-allow-origins=*",
        "test-type",
        "no-sandbox",
        "ignore-certificate-errors",
        "start-maximized",
        "incognito",
        "disable-infobars",
        "disable-gpu",
        "disable-default-apps",
        "disable-extensions"
      ]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://opencart.abstracta.us"
  }
  staging {
    webdriver.base.url = "https://staging.example.com"
  }
  production {
    webdriver.base.url = "http://opencart.abstracta.us"
  }
}
