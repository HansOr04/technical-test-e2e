serenity {
  project.name = "Technical Test E2E"
  outputDirectory = "target/site/serenity"
}

webdriver {
  driver = chrome
  autodownload = true

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--headless=new",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1920,1080",
        "--disable-extensions",
        "--disable-popup-blocking",
        "--disable-infobars"
      ]
    }
  }
}

environments {
  default {
    baseUrl = "https://example.com"
  }
  staging {
    baseUrl = "https://staging.example.com"
  }
  production {
    baseUrl = "https://example.com"
  }
}
